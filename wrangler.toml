name = "lexivk"
main = "index.js"
compatibility_date = "2026-02-10"

[[kv_namespaces]]
binding = "KV"
id = "9180f73744b349bd86fe9810fc61001f"

[[d1_databases]]
binding = "DB"
database_id = "848ff033-2d6c-4b3d-9727-1941c73d3295"

[[r2_buckets]]
binding = "MY_R2_BUCKET"
bucket_name = "lexi-media"

# Temporarily disabled queues. Re-enable after creating Cloudflare Queues resources.
[[queues.producers]]
binding = "VOICE_TASKS"
queue = "voice-tasks"

[[queues.producers]]
binding = "TEXT_TASKS"
queue = "text-tasks"

# [[queues.producers]]
# binding = "DICTIONARY_TASKS"
# queue = "dictionary-tasks"

[[queues.consumers]]
queue = "voice-tasks"
max_batch_size = 10
max_batch_timeout = 5

[[queues.consumers]]
queue = "text-tasks"
max_batch_size = 10
max_batch_timeout = 5

# [[queues.consumers]]
# queue = "dictionary-tasks"
# max_batch_size = 5
# max_batch_timeout = 2
# max_concurrency = 5

